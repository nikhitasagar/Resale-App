<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My profile — Tibi Resale</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Tibi Resale</a>
    <nav>
      <a href="index.html">Feed</a>
      <a href="new-listing.html">New listing</a>
      <a href="my-listings.html">My listings</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logout-btn">Log out</a>
    </nav>
  </header>

  <main>
    <h1>My profile</h1>

    <form id="profile-form" class="auth-form" style="margin: 0 0 40px">
      <label for="name">Display name</label>
      <input type="text" id="name" required autocomplete="name" />

      <label for="instagram">Instagram handle</label>
      <input type="text" id="instagram" required placeholder="e.g. yourhandle" />

      <div class="error" id="profile-error"></div>
      <div class="hint" id="profile-saved"></div>

      <button type="submit">Save changes</button>
    </form>

    <h1>Saved listings</h1>
    <div class="empty-state" id="saved-empty" style="display: none"></div>
    <div id="saved-grid"></div>
  </main>

  <script type="module" src="js/profile.js"></script>
</body>
</html>
