<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Resale App</title>
  <link rel="stylesheet" href="css/style.css?v=9" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="login.html">Resale App</a>
  </header>

  <main>
    <form id="login-form" class="auth-form">
      <h1>Log in</h1>

      <button type="button" class="secondary" id="google-btn">Continue with Google</button>

      <div class="divider">or</div>

      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" />

      <div class="error" id="error"></div>

      <button type="submit">Log in</button>
      <button type="button" class="secondary" id="magic-link-btn">
        Email me a magic link instead
      </button>
      <button type="button" class="secondary" id="forgot-password-btn">
        Forgot password?
      </button>

      <p class="hint">
        No account? <a href="signup.html">Sign up</a>
      </p>
    </form>

    <form id="new-password-form" class="auth-form" style="display: none">
      <h1>Set a new password</h1>

      <label for="new-password-input">New password</label>
      <input
        type="password"
        id="new-password-input"
        required
        autocomplete="new-password"
        minlength="6"
      />

      <div class="error" id="new-password-error"></div>

      <button type="submit">Set password</button>
    </form>
  </main>

  <script type="module">
    import { supabase } from "./js/supabase-client.js?v=9";
    import {
      signInWithPassword,
      signInWithMagicLink,
      signInWithGoogle,
      requestPasswordReset,
      createProfile,
    } from "./js/auth.js?v=9";

    // If this user signed up but email confirmation delayed profile creation, finish it now
    // using the fields signup.html stashed locally. Otherwise send anyone without a profile
    // back to signup.html to collect name + Instagram handle.
    async function routeAfterLogin() {
      const { data: { session } } = await supabase.auth.getSession();
      const { data: profile } = await supabase
        .from("profiles")
        .select("id")
        .eq("id", session.user.id)
        .maybeSingle();

      if (profile) {
        window.location.href = "index.html";
        return;
      }

      const pending = localStorage.getItem("pending_profile");
      if (pending) {
        const { name, instagram_handle } = JSON.parse(pending);
        const { error } = await createProfile(session.user.id, name, instagram_handle);
        localStorage.removeItem("pending_profile");
        if (!error) {
          window.location.href = "index.html";
          return;
        }
      }

      window.location.href = "signup.html";
    }

    const loginForm = document.getElementById("login-form");
    const newPasswordForm = document.getElementById("new-password-form");
    const newPasswordInput = document.getElementById("new-password-input");
    const newPasswordError = document.getElementById("new-password-error");

    // A password-recovery link establishes a session too, but landing here should show a
    // "set new password" form — never silently redirect past it into the app.
    const isRecoveryFlow = window.location.hash.includes("type=recovery");

    supabase.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        loginForm.style.display = "none";
        newPasswordForm.style.display = "flex";
      }
    });

    // Already logged in — route to the feed (or signup, if the profile is incomplete).
    // Skipped entirely for a recovery link so the form above gets a chance to show.
    if (!isRecoveryFlow) {
      const { data: { session: existingSession } } = await supabase.auth.getSession();
      if (existingSession) {
        await routeAfterLogin();
      }
    }

    newPasswordForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      newPasswordError.textContent = "";

      const { error } = await supabase.auth.updateUser({ password: newPasswordInput.value });
      if (error) {
        newPasswordError.textContent = error.message;
        return;
      }
      await routeAfterLogin();
    });

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorEl = document.getElementById("error");
    const magicLinkBtn = document.getElementById("magic-link-btn");
    const forgotPasswordBtn = document.getElementById("forgot-password-btn");
    const googleBtn = document.getElementById("google-btn");

    googleBtn.addEventListener("click", async () => {
      errorEl.textContent = "";
      const { error } = await signInWithGoogle();
      if (error) {
        errorEl.textContent = error.message;
      }
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.textContent = "";

      if (!passwordInput.value) {
        errorEl.textContent = "Enter your password, or use the magic link option.";
        return;
      }

      const { error } = await signInWithPassword(emailInput.value, passwordInput.value);
      if (error) {
        errorEl.textContent = error.message;
        return;
      }
      await routeAfterLogin();
    });

    magicLinkBtn.addEventListener("click", async () => {
      errorEl.textContent = "";
      if (!emailInput.value) {
        errorEl.textContent = "Enter your email first.";
        return;
      }
      const { error } = await signInWithMagicLink(emailInput.value);
      if (error) {
        errorEl.textContent = error.message;
        return;
      }
      errorEl.style.color = "#1e7a34";
      errorEl.textContent = "Check your email for a login link.";
    });

    forgotPasswordBtn.addEventListener("click", async () => {
      errorEl.textContent = "";
      if (!emailInput.value) {
        errorEl.textContent = "Enter your email first.";
        return;
      }
      const { error } = await requestPasswordReset(emailInput.value);
      if (error) {
        errorEl.textContent = error.message;
        return;
      }
      errorEl.style.color = "#1e7a34";
      errorEl.textContent = "Check your email for a password reset link.";
    });
  </script>
</body>
</html>
