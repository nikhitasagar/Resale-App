<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resale App</title>
  <link rel="stylesheet" href="css/style.css?v=6" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Resale App</a>
    <nav>
      <a href="new-listing.html">New listing</a>
      <a href="my-listings.html">My listings</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logout-btn">Log out</a>
    </nav>
  </header>

  <main>
    <h1>Listings</h1>

    <div class="filter-bar">
      <input type="search" id="search-input" placeholder="Search by name, style number, or material…" autocomplete="off" />
      <select id="type-filter">
        <option value="">All types</option>
      </select>
      <select id="size-filter">
        <option value="">All sizes</option>
      </select>
    </div>

    <div class="empty-state" id="empty-state" style="display: none">
      No listings yet. <a href="new-listing.html">Post the first one.</a>
    </div>
    <div class="listing-grid" id="listing-grid"></div>
  </main>

  <script type="module" src="js/feed.js?v=6"></script>
</body>
</html>
